<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>F1 Archive Catalog — US</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2f3d;
      --text: #e8eaef;
      --muted: #8b93a7;
      --accent: #e10600;
      --race: #3d8bfd;
      --highlights: #6bcb77;
      --extended: #4ecdc4;
      --review: #c9a227;
      --other: #a78bfa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.35rem;
      font-weight: 700;
    }

    h1 span { color: var(--accent); }

    .subtitle { margin: 0; color: var(--muted); font-size: 0.9rem; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-top: 1rem;
    }

    .toolbar input, .toolbar select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.65rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .toolbar input[type="search"] { min-width: 14rem; flex: 1; }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .stats strong { color: var(--text); }

    main { padding: 1rem 1.5rem 3rem; max-width: 1400px; margin: 0 auto; }

    .load-prompt {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }

    .load-prompt button, .load-prompt label.file-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.55rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .load-prompt label.file-btn input { display: none; }

    .season-block {
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
    }

    .season-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.85rem 1rem;
      background: #12151c;
      border-bottom: 1px solid var(--border);
    }

    .season-header h2 {
      margin: 0;
      font-size: 1.15rem;
    }

    .season-meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .race-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .race-dot {
      width: 1.1rem;
      height: 1.1rem;
      border-radius: 3px;
      font-size: 0.55rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: 700;
    }

    .race-dot.has-race { background: var(--race); color: #fff; }
    .race-dot.missing { background: #333; color: var(--muted); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th, td {
      padding: 0.45rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.03); }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .type-race { background: rgba(61,139,253,0.2); color: var(--race); }
    .type-highlights { background: rgba(107,203,119,0.2); color: var(--highlights); }
    .type-extended_highlights { background: rgba(78,205,196,0.2); color: var(--extended); }
    .type-season-review { background: rgba(201,162,39,0.2); color: var(--review); }
    .type-other { background: rgba(167,139,250,0.2); color: var(--other); }

    a { color: var(--race); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .round { color: var(--muted); font-variant-numeric: tabular-nums; }
    .duration { color: var(--muted); font-variant-numeric: tabular-nums; }
    .empty { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>F1 Archive Catalog <span>US</span></h1>
    <p class="subtitle">Browse <code>regions/us.json</code></p>
    <div class="toolbar">
      <input type="search" id="search" placeholder="Search name or URL…" disabled>
      <select id="typeFilter" disabled>
        <option value="">All types</option>
      </select>
      <select id="seasonFilter" disabled>
        <option value="">All seasons</option>
      </select>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <main id="main">
    <div class="load-prompt" id="loadPrompt">
      <p>Loading catalog…</p>
    </div>
  </main>

  <script>
    const TYPE_LABELS = {
      race: 'Race',
      highlights: 'Highlights',
      extended_highlights: 'Ext. HL',
      'season-review': 'Season review',
    };

    let allEntries = [];

    async function loadCatalog() {
      const paths = ['../regions/us.json', '/regions/us.json', 'regions/us.json'];
      for (const path of paths) {
        try {
          const res = await fetch(path);
          if (res.ok) return res.json();
        } catch (_) { /* try next */ }
      }
      return null;
    }

    function showFilePicker() {
      const main = document.getElementById('main');
      main.innerHTML = `
        <div class="load-prompt">
          <p>Could not load JSON automatically (browser blocks local file fetch).</p>
          <p>Run from repo root: <code>python3 -m http.server 8080</code><br>
             then open <code>http://localhost:8080/viewer/</code></p>
          <label class="file-btn">Choose regions/us.json
            <input type="file" accept=".json,application/json">
          </label>
        </div>`;
      main.querySelector('input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            render(JSON.parse(reader.result));
          } catch (err) {
            alert('Invalid JSON: ' + err.message);
          }
        };
        reader.readAsText(file);
      });
    }

    function typeClass(type) {
      if (TYPE_LABELS[type]) return 'type-' + type.replace(/-/g, '_');
      return 'type-other';
    }

    function typeLabel(type) {
      return TYPE_LABELS[type] || type;
    }

    function groupBySeason(entries) {
      const map = new Map();
      for (const e of entries) {
        if (!map.has(e.season)) map.set(e.season, []);
        map.get(e.season).push(e);
      }
      for (const rows of map.values()) {
        rows.sort((a, b) => {
          const ar = a.round ?? 9999;
          const br = b.round ?? 9999;
          if (ar !== br) return ar - br;
          return (a.type || '').localeCompare(b.type || '');
        });
      }
      return [...map.entries()].sort((a, b) => a[0] - b[0]);
    }

    function raceRounds(entries) {
      return new Set(
        entries.filter(e => e.type === 'race' && e.round != null).map(e => e.round)
      );
    }

    function updateStats(visible, total) {
      const types = {};
      const seasons = new Set();
      for (const e of visible) {
        types[e.type] = (types[e.type] || 0) + 1;
        seasons.add(e.season);
      }
      const typeStr = Object.entries(types)
        .sort((a, b) => b[1] - a[1])
        .map(([t, n]) => `${typeLabel(t)}: ${n}`)
        .join(' · ');
      document.getElementById('stats').innerHTML =
        `<span><strong>${visible.length}</strong> shown of ${total}</span>` +
        `<span><strong>${seasons.size}</strong> seasons</span>` +
        `<span>${typeStr}</span>`;
    }

    function render(entries) {
      allEntries = entries;
      const types = [...new Set(entries.map(e => e.type))].sort();
      const seasons = [...new Set(entries.map(e => e.season))].sort((a, b) => a - b);

      const typeFilter = document.getElementById('typeFilter');
      const seasonFilter = document.getElementById('seasonFilter');
      const search = document.getElementById('search');

      typeFilter.innerHTML = '<option value="">All types</option>' +
        types.map(t => `<option value="${t}">${typeLabel(t)}</option>`).join('');
      seasonFilter.innerHTML = '<option value="">All seasons</option>' +
        seasons.map(s => `<option value="${s}">${s}</option>`).join('');

      [search, typeFilter, seasonFilter].forEach(el => {
        el.disabled = false;
        el.oninput = el.onchange = applyFilters;
      });

      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      const type = document.getElementById('typeFilter').value;
      const season = document.getElementById('seasonFilter').value;

      const filtered = allEntries.filter(e => {
        if (type && e.type !== type) return false;
        if (season && String(e.season) !== season) return false;
        if (q) {
          const hay = `${e.name} ${e.url || ''} ${e.type}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      updateStats(filtered, allEntries.length);
      renderSeasons(groupBySeason(filtered));
    }

    function renderSeasons(groups) {
      const main = document.getElementById('main');
      if (!groups.length) {
        main.innerHTML = '<p class="load-prompt">No entries match your filters.</p>';
        return;
      }

      main.innerHTML = groups.map(([season, entries]) => {
        const races = raceRounds(entries);
        const maxRound = Math.max(0, ...entries.filter(e => e.round).map(e => e.round));
        const dots = maxRound
          ? Array.from({ length: maxRound }, (_, i) => {
              const r = i + 1;
              const cls = races.has(r) ? 'has-race' : 'missing';
              return `<span class="race-dot ${cls}" title="R${r}">${r}</span>`;
            }).join('')
          : '';

        const rows = entries.map(e => `
          <tr>
            <td class="round">${e.round != null ? 'R' + e.round : '—'}</td>
            <td>${escapeHtml(e.name)}</td>
            <td><span class="badge ${typeClass(e.type)}">${escapeHtml(typeLabel(e.type))}</span></td>
            <td class="duration">${e.duration || '<span class="empty">—</span>'}</td>
            <td>${e.url ? `<a href="${escapeAttr(e.url)}" target="_blank" rel="noopener">Open</a>` : '—'}</td>
          </tr>`).join('');

        const raceCount = races.size;
        const types = {};
        for (const e of entries) types[e.type] = (types[e.type] || 0) + 1;
        const meta = Object.entries(types).map(([t, n]) => `${n} ${typeLabel(t)}`).join(' · ');

        return `
          <section class="season-block">
            <div class="season-header">
              <h2>${season}</h2>
              <span class="season-meta">${entries.length} entries · ${raceCount} race rounds · ${meta}</span>
            </div>
            ${dots ? `<div class="race-bar">${dots}</div>` : ''}
            <table>
              <thead>
                <tr>
                  <th>Round</th>
                  <th>Name</th>
                  <th>Type</th>
                  <th>Duration</th>
                  <th>Link</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </section>`;
      }).join('');
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, '&#39;');
    }

    (async () => {
      const data = await loadCatalog();
      if (data) render(data);
      else showFilePicker();
    })();
  </script>
</body>
</html>
